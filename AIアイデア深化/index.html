<!DOCTYPE html>
<html lang="ja" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Idea Deepening</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#0f172a', /* slate-900 */
            foreground: '#f8fafc', /* slate-50 */
            primary: '#3b82f6', /* blue-500 */
            accent: '#8b5cf6', /* violet-500 */
            muted: '#475569', /* slate-600 */
          }
        }
      }
    }
  </script>
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
      background-attachment: fixed;
    }

    .glow-border {
      position: relative;
    }

    .glow-border::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
      opacity: 0;
    }

    .accordion-content.open {
      max-height: 1000px;
      opacity: 1;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.run/@google/genai"
      }
    }
  </script>
</head>

<body class="min-h-screen relative p-4 md:p-8">
  <div class="max-w-6xl mx-auto flex flex-col gap-6 relative z-10">
    <header class="mb-4 text-center">
      <h1
        class="text-3xl md:text-5xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-violet-500 pb-2">
        AI Idea Deepening
      </h1>
      <p class="text-slate-400 mt-2 text-sm md:text-base">
        複数のAIペルソナが、あなたのアイデアを徹底的に議論し、MVPまで昇華させます
      </p>
    </header>

    <!-- Status Bar -->
    <div
      class="bg-slate-800/80 backdrop-blur-md rounded-xl p-4 border border-blue-500/30 sticky top-4 z-20 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="relative flex h-3 w-3">
            <span id="statusPing"
              class="absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75 hidden"></span>
            <span id="statusDot" class="relative inline-flex rounded-full h-3 w-3 bg-slate-500"></span>
          </div>
          <p id="statusMessage" class="text-sm font-medium text-blue-100">アイデアを入力して分析を開始してください</p>
        </div>
        <span id="finalBadge" class="text-xs px-2 py-1 bg-green-500/20 text-green-300 rounded hidden">全プロセス完了</span>
      </div>
    </div>

    <!-- Final Scores (Hidden initially) -->
    <div id="evalContainer"
      class="hidden p-6 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 glow-border transition-all duration-500 transform translate-y-4 opacity-0">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="text-center p-3 rounded-xl bg-slate-900/50">
          <div class="text-xs text-slate-400">面白さ</div>
          <div id="scoreFun" class="text-2xl font-bold text-yellow-400">-</div>
        </div>
        <div class="text-center p-3 rounded-xl bg-slate-900/50">
          <div class="text-xs text-slate-400">独自性</div>
          <div id="scoreOrg" class="text-2xl font-bold text-blue-400">-</div>
        </div>
        <div class="text-center p-3 rounded-xl bg-slate-900/50">
          <div class="text-xs text-slate-400">実現可能性</div>
          <div id="scoreFeas" class="text-2xl font-bold text-green-400">-</div>
        </div>
        <div class="text-center p-3 rounded-xl bg-slate-900/50 border border-blue-500/30">
          <div class="text-xs text-blue-300">総合スコア</div>
          <div id="scoreTotal" class="text-3xl font-extrabold text-white">-</div>
        </div>
      </div>

      <div class="space-y-4">
        <h3 class="text-xl font-bold text-white flex items-center gap-2">MVP最終プラン（プロデューサー）</h3>
        <p id="finalConceptText" class="text-slate-300 leading-relaxed"></p>
        <p id="mvpPlanText" class="text-slate-300 leading-relaxed font-bold mt-2 text-blue-300"></p>
      </div>
    </div>

    <!-- Input Form -->
    <div class="bg-slate-800/50 backdrop-blur-md rounded-2xl p-6 border border-slate-700/50 shadow-xl glow-border">

      <!-- API Key Field -->
      <div class="mb-6 pb-6 border-b border-slate-700/50">
        <label for="apiKeyInput" class="text-sm font-semibold text-slate-300 flex items-center gap-2 mb-2">
          <i data-feather="key" class="w-4 h-4 text-slate-400"></i>
          Google Gemini API キー
        </label>
        <div class="relative">
          <input type="password" id="apiKeyInput" placeholder="AIzaSy............................."
            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 pl-10 text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all font-mono text-sm">
          <i data-feather="lock" class="w-4 h-4 text-slate-500 absolute left-3 top-3.5"></i>
        </div>
        <p class="text-xs text-slate-500 mt-2">
          ※APIキーはブラウザのローカルストレージにのみ保存され、外部サーバーには送信されません。
        </p>
      </div>

      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i data-feather="zap" class="w-5 h-5 text-yellow-400"></i>
        アイデアを入力
      </h2>
      <div class="flex flex-col gap-4">
        <textarea id="ideaInput" placeholder="例：ファンタジー世界のサバイバルゲーム。可愛いキャラがウイルスゾンビと戦う。武器クラフト要素あり。"
          class="w-full h-32 bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none transition-all placeholder:text-slate-500"></textarea>

        <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
          <div class="flex bg-slate-900/50 p-1 mt-1 rounded-lg border border-slate-700/50" id="modeSelector">
            <button data-mode="business"
              class="mode-btn px-4 py-2 rounded-md text-sm font-medium transition-all bg-blue-600 text-white shadow-md">ビジネス</button>
            <button data-mode="game"
              class="mode-btn px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">ゲーム</button>
            <button data-mode="research"
              class="mode-btn px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">研究</button>
          </div>

          <button id="submitBtn"
            class="group relative px-6 py-3 bg-gradient-to-r from-blue-600 to-violet-600 rounded-xl font-bold text-white shadow-lg overflow-hidden disabled:opacity-50 disabled:cursor-not-allowed w-full sm:w-auto flex items-center justify-center gap-2">
            <span class="relative z-10 flex items-center gap-2">
              分析開始 <i data-feather="send" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
            </span>
            <div
              class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out">
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Content Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Process Accordions -->
      <div class="flex flex-col gap-4" id="accordionsContainer">

        <!-- Organize AI -->
        <div class="border border-slate-700/50 rounded-xl overflow-hidden bg-slate-800/30 backdrop-blur-sm">
          <button
            class="accordion-btn w-full flex items-center justify-between p-4 bg-slate-800/50 hover:bg-slate-700/50 transition-colors"
            data-target="content-organize">
            <div class="flex items-center gap-3">
              <div id="icon-organize" class="p-2 rounded-lg bg-slate-700 text-slate-400">
                <i data-feather="file-text" class="w-5 h-5"></i>
              </div>
              <span class="font-semibold text-slate-200">1. 整理AI（PM）</span>
              <span id="badge-organize" class="text-xs px-2 py-1 rounded hidden ml-2"></span>
            </div>
            <i data-feather="chevron-down" class="w-5 h-5 text-slate-400 icon-chev"></i>
          </button>
          <div id="content-organize" class="accordion-content">
            <div class="p-4 border-t border-slate-700/50 bg-slate-900/30 text-sm text-slate-300" id="data-organize">
              <p class="text-slate-500 text-center py-4">待機中...</p>
            </div>
          </div>
        </div>

        <!-- Critique AI -->
        <div class="border border-slate-700/50 rounded-xl overflow-hidden bg-slate-800/30 backdrop-blur-sm">
          <button
            class="accordion-btn w-full flex items-center justify-between p-4 bg-slate-800/50 hover:bg-slate-700/50 transition-colors"
            data-target="content-critique">
            <div class="flex items-center gap-3">
              <div id="icon-critique" class="p-2 rounded-lg bg-slate-700 text-slate-400">
                <i data-feather="alert-triangle" class="w-5 h-5"></i>
              </div>
              <span class="font-semibold text-slate-200">2. 批評AI（投資家）</span>
              <span id="badge-critique" class="text-xs px-2 py-1 rounded hidden ml-2"></span>
            </div>
            <i data-feather="chevron-down" class="w-5 h-5 text-slate-400 icon-chev"></i>
          </button>
          <div id="content-critique" class="accordion-content">
            <div class="p-4 border-t border-slate-700/50 bg-slate-900/30 text-sm text-slate-300" id="data-critique">
              <p class="text-slate-500 text-center py-4">待機中...</p>
            </div>
          </div>
        </div>

        <!-- Improve AI -->
        <div class="border border-slate-700/50 rounded-xl overflow-hidden bg-slate-800/30 backdrop-blur-sm">
          <button
            class="accordion-btn w-full flex items-center justify-between p-4 bg-slate-800/50 hover:bg-slate-700/50 transition-colors"
            data-target="content-improve">
            <div class="flex items-center gap-3">
              <div id="icon-improve" class="p-2 rounded-lg bg-slate-700 text-slate-400">
                <i data-feather="plus-circle" class="w-5 h-5"></i>
              </div>
              <span class="font-semibold text-slate-200">3. 改善AI（CD）</span>
              <span id="badge-improve" class="text-xs px-2 py-1 rounded hidden ml-2"></span>
            </div>
            <i data-feather="chevron-down" class="w-5 h-5 text-slate-400 icon-chev"></i>
          </button>
          <div id="content-improve" class="accordion-content">
            <div class="p-4 border-t border-slate-700/50 bg-slate-900/30 text-sm text-slate-300" id="data-improve">
              <p class="text-slate-500 text-center py-4">待機中...</p>
            </div>
          </div>
        </div>

        <!-- Reality AI -->
        <div class="border border-slate-700/50 rounded-xl overflow-hidden bg-slate-800/30 backdrop-blur-sm">
          <button
            class="accordion-btn w-full flex items-center justify-between p-4 bg-slate-800/50 hover:bg-slate-700/50 transition-colors"
            data-target="content-reality">
            <div class="flex items-center gap-3">
              <div id="icon-reality" class="p-2 rounded-lg bg-slate-700 text-slate-400">
                <i data-feather="settings" class="w-5 h-5"></i>
              </div>
              <span class="font-semibold text-slate-200">4. 現実AI（CTO）</span>
              <span id="badge-reality" class="text-xs px-2 py-1 rounded hidden ml-2"></span>
            </div>
            <i data-feather="chevron-down" class="w-5 h-5 text-slate-400 icon-chev"></i>
          </button>
          <div id="content-reality" class="accordion-content">
            <div class="p-4 border-t border-slate-700/50 bg-slate-900/30 text-sm text-slate-300" id="data-reality">
              <p class="text-slate-500 text-center py-4">待機中...</p>
            </div>
          </div>
        </div>

      </div>

      <!-- Debate Log -->
      <div class="flex flex-col gap-6">
        <div
          class="bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl flex-1 flex flex-col overflow-hidden h-[500px]">
          <div class="p-4 border-b border-slate-700/50 bg-slate-800 flex items-center gap-2">
            <i data-feather="users" class="w-5 h-5 text-violet-400"></i>
            <h3 class="font-semibold text-slate-100">AI会議ログ</h3>
          </div>
          <div id="debateContainer" class="flex-1 p-4 overflow-y-auto w-full flex flex-col gap-4">
            <div class="flex flex-col items-center justify-center h-full text-slate-500 space-y-4"
              id="debatePlaceholder">
              <i data-feather="users" class="w-12 h-12 opacity-20"></i>
              <p class="text-center font-medium">AIの議論がここにストリーミングされます</p>
            </div>
            <!-- Messages go here -->
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { GoogleGenAI } from "@google/genai";

    let currentMode = "business";

    // Initialize UI
    feather.replace();

    // Load saved API key
    const savedKey = localStorage.getItem("geminiApiKey");
    if (savedKey) {
      document.getElementById("apiKeyInput").value = savedKey;
    }

    // Mode Selection
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.mode-btn').forEach(b => {
          b.className = "mode-btn px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800";
        });
        e.target.className = "mode-btn px-4 py-2 rounded-md text-sm font-medium transition-all bg-blue-600 text-white shadow-md";
        currentMode = e.target.getAttribute('data-mode');
      });
    });

    // Accordion Logic
    document.querySelectorAll('.accordion-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const targetId = e.currentTarget.getAttribute('data-target');
        const content = document.getElementById(targetId);
        content.classList.toggle('open');
        const icon = e.currentTarget.querySelector('.icon-chev');
        icon.classList.toggle('rotate-180');
      });
    });

    // Status Helper
    function updateStatus(step, st, message) {
      if (message) {
        document.getElementById('statusMessage').innerText = message;
      }

      const isRunning = st === 'running';
      document.getElementById('statusPing').style.display = isRunning ? 'block' : 'none';
      document.getElementById('statusDot').className = `relative inline-flex rounded-full h-3 w-3 ${isRunning ? 'bg-blue-500' : 'bg-slate-500'}`;

      if (step) {
        const iconDiv = document.getElementById(`icon-${step}`);
        const badge = document.getElementById(`badge-${step}`);
        if (iconDiv && badge) {
          if (st === 'running') {
            iconDiv.className = "p-2 rounded-lg bg-blue-500/20 text-blue-400 animate-pulse";
            badge.className = "text-xs px-2 py-1 rounded ml-2 bg-blue-500/20 text-blue-300";
            badge.innerText = "実行中...";
            badge.style.display = "inline-block";
            document.getElementById(`content-${step}`).classList.add('open');
          } else if (st === 'completed') {
            iconDiv.className = "p-2 rounded-lg bg-green-500/20 text-green-400";
            badge.className = "text-xs px-2 py-1 rounded ml-2 bg-green-500/20 text-green-300";
            badge.innerText = "完了";
          }
        }
      }
    }

    // Call Gemini Helper
    async function callAI(systemInstruction, promptText, aiInstance) {
      const response = await aiInstance.models.generateContent({
        model: "gemini-2.5-flash",
        contents: promptText,
        config: {
          systemInstruction: systemInstruction,
          responseMimeType: "application/json",
          temperature: 0.7,
        }
      });
      return JSON.parse(response.text);
    }

    // Form Submit
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      if (!apiKey) {
        alert("Gemini APIキーを入力してください。");
        document.getElementById('apiKeyInput').focus();
        return;
      }

      const idea = document.getElementById('ideaInput').value.trim();
      if (!idea) return;

      // Save valid key
      localStorage.setItem("geminiApiKey", apiKey);
      const ai = new GoogleGenAI({ apiKey: apiKey });

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;

      // Reset UI
      document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('open'));
      ['organize', 'critique', 'improve', 'reality'].forEach(step => {
        document.getElementById(`icon-${step}`).className = "p-2 rounded-lg bg-slate-700 text-slate-400";
        document.getElementById(`badge-${step}`).style.display = "none";
        document.getElementById(`data-${step}`).innerHTML = '<p class="text-slate-500 text-center py-4">待機中...</p>';
      });
      document.getElementById('debatePlaceholder').style.display = 'flex';
      Array.from(document.getElementById('debateContainer').children).forEach(el => {
        if (el.id !== 'debatePlaceholder') el.remove();
      });

      document.getElementById('evalContainer').classList.remove('opacity-100', 'translate-y-0');
      document.getElementById('evalContainer').classList.add('opacity-0', 'translate-y-4', 'hidden');
      document.getElementById('finalBadge').classList.add('hidden');

      try {
        // --- PROMPTS ---
        const sysPM = `あなたは優秀なプロジェクトマネージャー（PM）です。ユーザーのアイデアを分析し、以下のJSON形式で出力してください。\n{"idea_summary": "全体概要（100文字程度）","target_user": "想定ターゲットユーザー","core_value": "コアとなる価値","unclear_points": ["点1", "点2", "点3"]}`;
        const sysVC = `あなたは冷酷で論理的な投資家（VC）です。忖度なくアイデアを批判し弱点を指摘してください。JSONで出力。\n{"weak_points": ["弱点1", "弱点2"], "risk_factors": ["リスク1", "リスク2"]}`;
        const sysCD = `あなたはクリエイティブディレクターです。PMの整理とVCの批判を踏まえ、魅力的に改善してください。JSONで出力。\n{"improvement_plan": "改善方針","new_features": ["機能1", "機能2"],"updated_concept": "新コンセプト（ワンフレーズ）"}`;
        const sysCTO = `あなたは現実主義のCTOです。ここまでの議論を踏まえ、MVP開発の観点から技術的評価をしてください。JSONで出力。\n{"technical_difficulty": "高/中/低","estimated_cost": "開発期間(1人〜3人で1〜3ヶ月枠)","feasibility_comment": "CTOコメント"}`;
        const sysDebate = `あなたは司会AIです。投資家AI、改善AI、現実AIの3名を擬似的にロールプレイさせ、機能やMVPの方針について議論させてください。JSONで出力。\n{ "messages": [ { "persona": "批評AI", "message": "セリフ" }, { "persona": "改善AI", "message": "セリフ" } ], "mvp_version": "議論の末の結論MVP", "priority_features": ["優先1"] }`;
        const sysProducer = `あなたはプロデューサーです。これまでの全情報を統合し、最終評価とMVPプランを決定してください。JSONで出力:\n{"total_score": 0-100, "originality_score": 0-100, "feasibility_score": 0-100, "fun_score": 0-100, "final_concept": "最終プロット", "strengths": ["強み"], "remaining_issues": ["課題"], "mvp_plan": "プラン"}`;

        // Step 1
        updateStatus("organize", "running", "整理AI（PM）が構造を整理しています...");
        const summaryData = await callAI(sysPM, `アイデア:\n${idea}\nモード: ${currentMode}`, ai);
        document.getElementById('data-organize').innerHTML = `
          <div class="space-y-3">
            <div><strong class="text-slate-100">概要:</strong> ${summaryData.idea_summary}</div>
            <div><strong class="text-slate-100">ターゲット:</strong> ${summaryData.target_user}</div>
            <div><strong class="text-slate-100">コア価値:</strong> ${summaryData.core_value}</div>
            <div><strong class="text-slate-100">不明点:</strong><ul class="list-disc pl-5 mt-1 text-slate-400">${summaryData.unclear_points.map(p => `<li>${p}</li>`).join('')}</ul></div>
          </div>
        `;
        updateStatus("organize", "completed");

        // Step 2
        updateStatus("critique", "running", "批評AI（冷酷な投資家）が弱点を探しています...");
        const critiqueData = await callAI(sysVC, `アイデア概要:\n${JSON.stringify(summaryData)}`, ai);
        document.getElementById('data-critique').innerHTML = `
          <div class="space-y-3">
            <div><strong class="text-red-400">弱点:</strong><ul class="list-disc pl-5 mt-1 text-slate-400">${critiqueData.weak_points.map(p => `<li>${p}</li>`).join('')}</ul></div>
            <div><strong class="text-orange-400">リスク:</strong><ul class="list-disc pl-5 mt-1 text-slate-400">${critiqueData.risk_factors.map(p => `<li>${p}</li>`).join('')}</ul></div>
          </div>
        `;
        updateStatus("critique", "completed");

        // Step 3
        updateStatus("improve", "running", "改善AI（CD）が魅力を高めています...");
        const improveData = await callAI(sysCD, `元アイデア:\n${JSON.stringify(summaryData)}\n\n批判された弱点:\n${JSON.stringify(critiqueData)}`, ai);
        document.getElementById('data-improve').innerHTML = `
          <div class="space-y-3">
            <div><strong class="text-violet-400">改善案:</strong> ${improveData.improvement_plan}</div>
            <div><strong class="text-violet-400">新機能:</strong><ul class="list-disc pl-5 mt-1 text-slate-400">${improveData.new_features.map(f => `<li>${f}</li>`).join('')}</ul></div>
            <div class="p-3 bg-violet-500/10 border border-violet-500/20 rounded mt-2"><strong class="text-violet-300 block mb-1">アップデート後のコンセプト:</strong><span class="text-slate-300 italic">${improveData.updated_concept}</span></div>
          </div>
        `;
        updateStatus("improve", "completed");

        // Step 4
        updateStatus("reality", "running", "現実AI（CTO）が技術検証をしています...");
        const realityData = await callAI(sysCTO, `改善案:\n${JSON.stringify(improveData)}`, ai);
        document.getElementById('data-reality').innerHTML = `
          <div class="space-y-3">
            <div class="flex justify-between items-center border-b border-slate-700/50 pb-2"><strong class="text-slate-100">技術難易度:</strong><span class="px-2 py-1 bg-slate-700 rounded text-slate-200">${realityData.technical_difficulty}</span></div>
            <div class="flex justify-between items-center border-b border-slate-700/50 pb-2"><strong class="text-slate-100">想定開発期間/コスト:</strong><span class="px-2 py-1 bg-slate-700 rounded text-slate-200">${realityData.estimated_cost}</span></div>
            <div><strong class="text-slate-100">CTOコメント:</strong><p class="mt-1 text-slate-400">${realityData.feasibility_comment}</p></div>
          </div>
        `;
        updateStatus("reality", "completed");

        // Step 5: Debate
        updateStatus(null, "running", "AIたちが議論を開始しました...");
        document.getElementById('debatePlaceholder').style.display = 'none';
        const debouncePrompt = `改善案:${JSON.stringify(improveData)}\n技術:${JSON.stringify(realityData)}\nこれらから、各AI(批評, 改善, 現実)がメッセージを1通ずつ発言してMVPを議論し結論を出すJSONを出力して。`;
        const debateData = await callAI(sysDebate, debouncePrompt, ai);

        const debateContainer = document.getElementById('debateContainer');

        for (const m of debateData.messages) {
          const isCrit = m.persona === '批評AI';
          const isImp = m.persona === '改善AI';

          const wrapper = document.createElement('div');
          wrapper.className = `flex gap-3 ${isCrit ? 'flex-row' : isImp ? 'flex-row-reverse' : 'flex-row'}`;

          const bubble = document.createElement('div');
          bubble.className = `p-3 rounded-2xl max-w-[85%] text-sm ${isCrit ? 'bg-red-500/10 border border-red-500/20 text-red-100 rounded-tl-sm' :
            isImp ? 'bg-violet-500/10 border border-violet-500/20 text-violet-100 rounded-tr-sm' :
              'bg-slate-700 border border-slate-600 text-slate-200 rounded-bl-sm'
            }`;
          bubble.innerHTML = `<span class="text-xs font-bold text-slate-400 mb-1 block">${m.persona}</span>${m.message}`;

          wrapper.appendChild(bubble);
          debateContainer.appendChild(wrapper);
          // Wait a bit to simulate streaming visually
          await new Promise(r => setTimeout(r, 600));
        }

        const resBox = document.createElement('div');
        resBox.className = "mt-4 p-4 border border-blue-500/30 bg-blue-500/10 rounded-xl relative overflow-hidden";
        resBox.innerHTML = `
          <div class="absolute top-0 right-0 w-20 h-20 bg-blue-500/20 blur-xl rounded-full"></div>
          <h4 class="font-bold text-blue-300 mb-2">確定したMVPバージョン</h4>
          <p class="text-sm text-slate-200">${debateData.mvp_version}</p>
          <h4 class="font-bold text-blue-300 mb-2 mt-4 text-xs">実装の優先度</h4>
          <ul class="text-sm text-slate-300 list-inside list-decimal">
            ${debateData.priority_features.map(f => `<li>${f}</li>`).join('')}
          </ul>
        `;
        debateContainer.appendChild(resBox);

        // Step 6: Final Eval
        updateStatus(null, "running", "最終結果をまとめています...");
        const finalPrompt = `全情報統合:\nサマリ:${JSON.stringify(summaryData)}\n改善:${JSON.stringify(improveData)}\n技術:${JSON.stringify(realityData)}\n結論MVP:${debateData.mvp_version}`;
        const finalData = await callAI(sysProducer, finalPrompt, ai);

        // Fill Final Scores
        document.getElementById('scoreTotal').innerText = finalData.total_score;
        document.getElementById('scoreFun').innerText = finalData.fun_score;
        document.getElementById('scoreOrg').innerText = finalData.originality_score;
        document.getElementById('scoreFeas').innerText = finalData.feasibility_score;
        document.getElementById('finalConceptText').innerText = finalData.final_concept;
        document.getElementById('mvpPlanText').innerText = `■ MVP開発プラン: ${finalData.mvp_plan}`;

        const evalC = document.getElementById('evalContainer');
        evalC.classList.remove('hidden');
        // trigger reflow
        void evalC.offsetWidth;
        evalC.classList.remove('opacity-0', 'translate-y-4');
        evalC.classList.add('opacity-100', 'translate-y-0');

        updateStatus(null, "idle", "分析が完了しました。");
        document.getElementById('finalBadge').classList.remove('hidden');

      } catch (err) {
        console.error(err);
        updateStatus(null, "idle", "エラーが発生しました。コンソールをご確認ください。");
      } finally {
        btn.disabled = false;
      }
    });

  </script>
</body>

</html>
